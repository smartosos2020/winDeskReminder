name: Build portable EXE

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore .\WinDeskReminder.csproj

      - name: Build
        run: dotnet build .\WinDeskReminder.csproj -c Release --no-restore

      - name: Publish portable EXE
        run: .\scripts\Build-Portable.ps1

      - name: Upload portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinDeskReminder-win-x64
          path: artifacts/publish/win-x64-1.0.0-single/WinDeskReminder.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/publish/win-x64-1.0.0-single/WinDeskReminder.exe
